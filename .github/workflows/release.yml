name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          zip -r freezer-management-card.zip .             -x ".git/*"             -x ".github/*"             -x "__pycache__/*"             -x "*.pyc"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: freezer-management-card.zip
          generate_release_notes: true
